# Local network settings
server=0
listen=0
noupnp=1
maxconnections=16
daemon=0

# Local RPC (external to Firo Core) 
rpcconnect=192.168.0.7
rpcport=8888
rpcuser=username
rpcpassword=password

# Indexes for testing & firo-cli
txindex=1
addressindex=1
spentindex=1
timestampindex=1
coinstatsindex=1
mobile=1

# ZMQ for real-time notifications
zmqpubrawtx=tcp://127.0.0.1:28332
zmqpubrawblock=tcp://127.0.0.1:28333
zmqpubhashtx=tcp://127.0.0.1:28334
zmqpubhashblock=tcp://127.0.0.1:28335